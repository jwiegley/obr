pre-commit:
  parallel: true
  commands:
    fmt-check:
      glob: "*.rs"
      run: cargo fmt --all -- --check
    clippy:
      glob: "*.rs"
      run: cargo clippy --all-targets -- --deny warnings
    test:
      glob: "*.{rs,toml}"
      run: cargo test --lib --bins
    shellcheck:
      glob: "*.sh"
      run: shellcheck {staged_files}
    shfmt-check:
      glob: "*.sh"
      run: shfmt -d {staged_files}
    nix-check:
      glob: "*.{rs,nix,toml,lock}"
      run: nix flake check --no-warn-dirty 2>&1
